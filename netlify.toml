# Netlify configuration for Nored Farms

[build]
  publish = "."
  functions = "api"

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Clean URL for kanban
[[redirects]]
  from = "/kanban"
  to = "/kanban.html"
  status = 200

# Clean URL for image kanban
[[redirects]]
  from = "/image-kanban"
  to = "/image-kanban.html"
  status = 200

# Clean URL for marketplace
[[redirects]]
  from = "/marketplace"
  to = "/marketplace.html"
  status = 200

# No catch-all redirect - static site serves files directly

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PATCH, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, x-api-key"

# Cache static assets (short cache since filenames aren't fingerprinted)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Cache images (revalidate to pick up new versions)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Stripe webhook needs raw body - ensure it routes through functions
[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# Wholesale API endpoints
[[redirects]]
  from = "/api/wholesale-checkout"
  to = "/.netlify/functions/wholesale-checkout"
  status = 200

[[redirects]]
  from = "/api/approve-wholesale"
  to = "/.netlify/functions/approve-wholesale"
  status = 200

[[redirects]]
  from = "/api/send-notification"
  to = "/.netlify/functions/send-notification"
  status = 200

# Contact form confirmation email
[[redirects]]
  from = "/api/send-contact-confirmation"
  to = "/.netlify/functions/send-contact-confirmation"
  status = 200

# Content API endpoints (FlowB EC)
[[redirects]]
  from = "/api/content-products"
  to = "/.netlify/functions/content-products"
  status = 200

[[redirects]]
  from = "/api/content-articles"
  to = "/.netlify/functions/content-articles"
  status = 200

[[redirects]]
  from = "/api/content-media"
  to = "/.netlify/functions/content-media"
  status = 200

[[redirects]]
  from = "/api/content-categories"
  to = "/.netlify/functions/content-categories"
  status = 200

[[redirects]]
  from = "/api/content-seo"
  to = "/.netlify/functions/content-seo"
  status = 200

[[redirects]]
  from = "/api/content-webhook"
  to = "/.netlify/functions/content-webhook"
  status = 200

# Environment variables (set these in Netlify UI)
# STRIPE_SECRET_KEY = sk_test_...
# STRIPE_PUBLISHABLE_KEY = pk_test_...
# STRIPE_WEBHOOK_SECRET = whsec_...
# SUPABASE_URL = https://YOUR_PROJECT.supabase.co
# SUPABASE_SERVICE_ROLE_KEY = eyJ...
# CONTENT_API_KEY = <generated secret for FlowB EC API access>
# FLOWB_WEBHOOK_URL = https://flowb.fly.dev/api/v1/biz/inbound-webhook
# RESEND_API_KEY = re_... (for contact form confirmation emails)
