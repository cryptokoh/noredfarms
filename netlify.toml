# Netlify configuration for Nored Farms

[build]
  publish = "."
  functions = "api"

# Redirect API calls to Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Clean URL for kanban
[[redirects]]
  from = "/kanban"
  to = "/kanban.html"
  status = 200

# No catch-all redirect - static site serves files directly

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

# Cache static assets (short cache since filenames aren't fingerprinted)
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Long cache for images/fonts (rarely change)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Stripe webhook needs raw body - ensure it routes through functions
[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

# Environment variables (set these in Netlify UI)
# STRIPE_SECRET_KEY = sk_test_...
# STRIPE_PUBLISHABLE_KEY = pk_test_...
# STRIPE_WEBHOOK_SECRET = whsec_...
# SUPABASE_URL = https://YOUR_PROJECT.supabase.co
# SUPABASE_SERVICE_ROLE_KEY = eyJ...
