    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #12181a;
            --bg-alt: #181e20;
            --bg-card: #1e2628;
            --bg-hover: #263032;
            --text: #bccac4;
            --text-dim: #8e9c98;
            --text-muted: #506460;
            --accent: #50e8c0;
            --accent-dim: rgba(80,232,192,0.07);
            --accent-border: rgba(80,232,192,0.12);
            --accent-border-strong: rgba(80,232,192,0.25);
            --error: #c45c4b;
            --warning: #d4a843;
            --success: #50e8c0;
            --radius: 12px;
            --font: 'Inter', -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            font-weight: 350;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* --- NAV --- */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(18,24,26,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--accent-border);
            padding: 0 24px;
        }
        .top-bar-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .top-bar-logo {
            color: var(--text);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .top-bar-logo svg { color: var(--accent); }
        .top-bar-sep {
            width: 1px;
            height: 20px;
            background: var(--accent-border);
        }
        .top-bar-title {
            font-size: 14px;
            color: var(--text-dim);
            font-weight: 350;
        }
        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .top-bar-link {
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 99em;
            transition: all 0.2s ease;
        }
        .top-bar-link:hover {
            color: var(--text);
            background: var(--accent-dim);
        }

        /* --- STATS BAR --- */
        .stats-bar {
            background: var(--bg-alt);
            border-bottom: 1px solid rgba(80,232,192,0.05);
            padding: 12px 24px;
        }
        .stats-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 24px;
            align-items: center;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-dim);
        }
        .stat-count {
            font-weight: 500;
            color: var(--text);
            font-size: 16px;
        }
        .stat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .stat-dot.needs { background: var(--error); }
        .stat-dot.placeholder { background: var(--warning); }
        .stat-dot.ready { background: var(--success); }
        .stat-dot.missing { background: var(--text-muted); }

        /* --- BOARD --- */
        .board {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .board { grid-template-columns: 1fr; }
        }

        .column {
            min-height: 200px;
        }
        .column-head {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--accent-border);
            position: sticky;
            top: 56px;
            background: var(--bg);
            z-index: 10;
        }
        .column-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .column-dot.needs { background: var(--error); }
        .column-dot.placeholder { background: var(--warning); }
        .column-dot.ready { background: var(--success); }

        .column-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .column-count {
            font-size: 12px;
            color: var(--text-muted);
            background: var(--bg-alt);
            padding: 2px 8px;
            border-radius: 99em;
        }

        /* --- CARD --- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--accent-border);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 12px;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .card:hover {
            border-color: var(--accent-border-strong);
            transform: translateY(-1px);
        }
        .card-img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            display: block;
            background: linear-gradient(135deg, #1a3028, #28584e 50%, #1e4640);
        }
        .card-img-missing {
            width: 100%;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2a1a1a, #3a2020 50%, #2a1515);
            color: var(--error);
            font-size: 12px;
            font-weight: 400;
        }
        .card-body {
            padding: 12px 14px;
        }
        .card-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }
        .card-location {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .card-location code {
            background: var(--bg-alt);
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-dim);
        }
        .card-desc {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tag {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 99em;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .tag-page {
            background: rgba(80,232,192,0.08);
            color: var(--accent);
        }
        .tag-hero {
            background: rgba(59,130,246,0.12);
            color: #6baaff;
        }
        .tag-card {
            background: rgba(139,92,246,0.12);
            color: #b49cfa;

            color: #f9a366;

            color: #9ca3af;
        }

            background: rgba(234,179,8,0.12);
            color: #eab308;
        }

        .card-current {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(80,232,192,0.05);
        }
        .card-current strong {
            color: var(--text-dim);
            font-weight: 400;
        }

        /* --- FOOTER --- */

            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid rgba(80,232,192,0.05);
        }
    </style>
</head>

// Tag display names
const TAG_MAP = {
    "hero": { label: "Hero", cls: "tag-hero" },
    "card": { label: "Card", cls: "tag-card" },
    "section": { label: "Section", cls: "tag-section" },
    "product": { label: "Product", cls: "tag-product" },
    "meta": { label: "Meta", cls: "tag-meta" },
    "page-home": { label: "Home", cls: "tag-page" },
    "page-about": { label: "About", cls: "tag-page" },
    "page-classroom": { label: "Classroom", cls: "tag-page" },
};

function renderBoard() {
    const cols = {
        missing: document.getElementById('colNeeds'),
        placeholder: document.getElementById('colPlaceholder'),
        ready: document.getElementById('colReady')
    };

    const counts = { missing: 0, placeholder: 0, ready: 0 };

    IMAGE_DATA.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';

        // Image preview
        let imgHtml;
        if (item.status === 'missing') {
            imgHtml = `<div class="card-img-missing">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            </div>`;
        } else {
            const imgPath = item.file;
            imgHtml = `<img class="card-img" src="images/${imgPath}" alt="${item.name}" loading="lazy" onerror="this.outerHTML='<div class=\\'card-img-missing\\'>File not found</div>'">`;
        }

        // Tags
        const tagsHtml = item.tags.map(t => {
            const info = TAG_MAP[t] || { label: t, cls: 'tag-page' };
            return `<span class="tag ${info.cls}">${info.label}</span>`;
        }).join('');

        // Pages
        const pagesHtml = item.pages.map(p => `<code>${p}</code>`).join(' ');

        card.innerHTML = `
            ${imgHtml}
            <div class="card-body">
                <div class="card-name">${item.name}</div>
                <div class="card-location">${pagesHtml}</div>
                <div class="card-desc">${item.needs}</div>
                <div class="card-tags">${tagsHtml}</div>
                <div class="card-current"><strong>File:</strong> images/${item.file}</div>
            </div>
        `;

        // Route to column
        const colKey = item.status === 'missing' ? 'missing' : item.status;
        cols[colKey].appendChild(card);
        counts[colKey]++;
    });

    // Update counts
    document.getElementById('countNeeds').textContent = counts.missing;
    document.getElementById('countPlaceholder').textContent = counts.placeholder;
    document.getElementById('countReady').textContent = counts.ready;
    document.getElementById('countMissing').textContent = counts.missing;
    document.getElementById('colNeedsCount').textContent = counts.missing;
    document.getElementById('colPlaceholderCount').textContent = counts.placeholder;
    document.getElementById('colReadyCount').textContent = counts.ready;
}

renderBoard();
</script>

</body>
</html>
