<!DOCTYPE html>
<html lang="en">
<head>
    <script src="/dev-console-filter.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Account | Nored Farms</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@350;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <link rel="stylesheet" href="account-styles.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../courses/supabase-config.js"></script>
    <script src="../courses/auth.js"></script>
</head>
<body>
    <nav class="nav" id="nav">
        <a href="../index.html" class="nav-logo"><img src="../images/logo.svg" alt="Nored Farms" style="height:24px;width:auto;vertical-align:middle;margin-right:4px;">Nored Farms<span class="dot"></span></a>
        <div class="nav-links" id="navLinks">
            <a href="../index.html#products">Products</a>
            <a href="../blog.html">Articles</a>
            <a href="../classes.html">Classes</a>
            <a href="../about-us.html">Company</a>
            <a href="../contact.html" class="nav-cta">Get Started</a>
        </div>
        <button class="hamburger" id="navToggle" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <main class="account-page">
        <div class="account-container">
            <div class="account-header">
                <h1>My Account</h1>
                <p>Welcome back, <span id="accountGreeting"></span></p>
                <button class="account-signout" id="signOutBtn">Sign Out</button>
            </div>

            <div class="account-tabs">
                <button class="account-tab active" data-tab="orders">Orders</button>
                <button class="account-tab" data-tab="favorites">Favorites</button>
                <button class="account-tab" data-tab="cart">Cart</button>
            </div>

            <div id="panel-orders" class="tab-panel active">
                <div id="ordersContent">
                    <div class="account-loading">Loading orders...</div>
                </div>
            </div>

            <div id="panel-favorites" class="tab-panel">
                <div id="favoritesContent">
                    <div class="account-loading">Loading favorites...</div>
                </div>
            </div>

            <div id="panel-cart" class="tab-panel">
                <div id="cartContent">
                    <div class="account-loading">Loading cart...</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="seed-footer">
        <div class="seed-footer-inner">
                        <div class="seed-footer-social">
                <span style="font-size: 13px; color: var(--color--olivegreen); margin-right: 8px;">Follow us</span>
                <div class="social-follow">
                    <a href="https://instagram.com/noredfarms" target="_blank" rel="noopener" aria-label="Follow on Instagram">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                    </a>
                    <a href="https://tiktok.com/@noredfarms" target="_blank" rel="noopener" aria-label="Follow on TikTok">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>
                    </a>
                </div>
            </div>
            <div class="seed-footer-bottom">
                <span>&copy; 2026 Nored Farms. All rights reserved.</span>
                <span>Crafted in Texas Hill Country</span>
            </div>
        </div>
    </footer>

    <script src="../script.js"></script>
    <script src="../cart.js"></script>
    <script src="account-app.js"></script>
    <script>initSiteAuth();</script>
</body>
</html>
